name: Python Write File Demo

on: workflow_dispatch

jobs:
  write-file-job:
    runs-on: ubuntu-latest # Run on a virtual machine provided by GitHub

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4 # Action to access your repository's files

      - name: Set up Python
        uses: actions/setup-python@v5 # Action to install Python environment
        with:
          python-version: '3.10' # Specify the Python version

      - name: Run Python script to write a file
        run: |
          python -u script.py # Execute your Python script # The -u flag ensures unbuffered output, so print statements appear correctly

      - name: Configure Git for commit
        run: |
          git config user.name "github-actions[bot]" # Official bot user
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit and push the new file
        run: |
          git add output.txt # Stage the specific file
          git commit -m "Add generated output.txt file"
          git push
        # This will push the changes to the branch that triggered the workflow
